# Harbor v2.11.0 本機開發部署。
#
# 服務組成：log / registry / registryctl / postgresql / redis / core /
#           portal / jobservice / proxy
#
# 對外 port：8081 -> proxy:8080（HTTP）
# 各 service 的設定檔由 ./build.sh 透過 goharbor/prepare image 從
# harbor.yml 產生至 ../harbor_data/config/<service>/，請務必先執行 ./build.sh
# 再以 ../run.sh 或 docker compose up -d 啟動。
services:
  log:
    image: goharbor/harbor-log:v2.11.0
    container_name: harbor-log
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ../harbor_data/log:/var/log/docker/:z
      - type: bind
        source: ../harbor_data/config/log/logrotate.conf
        target: /etc/logrotate.d/logrotate.conf
      - type: bind
        source: ../harbor_data/config/log/rsyslog_docker.conf
        target: /etc/rsyslog.d/rsyslog_docker.conf
    ports:
      - "127.0.0.1:1514:10514"
    networks:
      - harbor

  registry:
    image: goharbor/registry-photon:v2.11.0
    container_name: registry
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ../harbor_data/registry:/storage:z
      - ../harbor_data/config/registry/:/etc/registry/:z
      - type: bind
        source: ../harbor_data/secret/registry/root.crt
        target: /etc/registry/root.crt
      - type: bind
        source: ../harbor_data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "registry"

  registryctl:
    image: goharbor/harbor-registryctl:v2.11.0
    container_name: registryctl
    env_file:
      - ../harbor_data/config/registryctl/env
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ../harbor_data/registry:/storage:z
      - ../harbor_data/config/registry/:/etc/registry/:z
      - type: bind
        source: ../harbor_data/config/registryctl/config.yml
        target: /etc/registryctl/config.yml
      - type: bind
        source: ../harbor_data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - log
      - registry
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "registryctl"

  postgresql:
    image: goharbor/harbor-db:v2.11.0
    container_name: harbor-db
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ../harbor_data/database:/var/lib/postgresql/data:z
    networks:
      harbor:
    env_file:
      - ../harbor_data/config/db/env
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "postgresql"

  redis:
    image: goharbor/redis-photon:v2.11.0
    container_name: redis
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ../harbor_data/redis:/var/lib/redis
    networks:
      harbor:
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "redis"

  core:
    image: goharbor/harbor-core:v2.11.0
    container_name: harbor-core
    env_file:
      - ../harbor_data/config/core/env
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    volumes:
      - ../harbor_data/ca_download/:/etc/core/ca/:z
      - ../harbor_data/:/data/:z
      - ../harbor_data/config/core/certificates/:/etc/core/certificates/:z
      - type: bind
        source: ../harbor_data/config/core/app.conf
        target: /etc/core/app.conf
      - type: bind
        source: ../harbor_data/secret/core/private_key.pem
        target: /etc/core/private_key.pem
      - type: bind
        source: ../harbor_data/secret/keys/secretkey
        target: /etc/core/key
      - type: bind
        source: ../harbor_data/psc/
        target: /etc/core/token/
      - type: bind
        source: ../harbor_data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      harbor:
    depends_on:
      - log
      - registry
      - redis
      - postgresql
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "core"

  portal:
    image: goharbor/harbor-portal:v2.11.0
    container_name: harbor-portal
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - type: bind
        source: ../harbor_data/config/portal/nginx.conf
        target: /etc/nginx/nginx.conf
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "portal"

  jobservice:
    image: goharbor/harbor-jobservice:v2.11.0
    container_name: harbor-jobservice
    env_file:
      - ../harbor_data/config/jobservice/env
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ../harbor_data/job_logs:/var/log/jobs:z
      - type: bind
        source: ../harbor_data/config/jobservice/config.yml
        target: /etc/jobservice/config.yml
      - type: bind
        source: ../harbor_data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - core
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "jobservice"

  proxy:
    image: goharbor/nginx-photon:v2.11.0
    container_name: nginx
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ../harbor_data/config/nginx:/etc/nginx:z
      - type: bind
        source: ../harbor_data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    ports:
      - "8081:8080"
    depends_on:
      - registry
      - core
      - portal
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "proxy"

networks:
  harbor:
    name: harbor
    external: false
