# Harbor v2.11.0 本機開發部署。
#
# 服務組成：log / registry / registryctl / postgresql / redis / core /
#           portal / jobservice / proxy
#
# 對外 port：8081 -> proxy:8080（HTTP）
# 各 service 的設定檔由 ./build.sh 透過 goharbor/prepare image 從
# harbor.yml 產生至 ./data/config/<service>/，請務必先執行 ./build.sh
# 再以 ../run.sh 或 docker compose up -d 啟動。
#
# 重要設計：
#   - 以 name: harbor 固定 compose 專案名，避免與其他同樣放在 docker/ 目錄、
#     專案名同被推導為 "docker" 的專案互相視為 orphan 而誤刪。
#   - 所有 service 透過 syslog driver 將 log 送往 harbor-log 的 1514 埠，
#     因此除 log 本身外，全部 service 的 depends_on 對 log 採
#     condition: service_healthy，等 harbor-log 的 syslog 真正就緒後才啟動，
#     避免冷啟動時 "logging driver: connection refused" 的搶跑問題
#     （在 Apple Silicon 以模擬執行 amd64 image 時 log 就緒較慢，尤其關鍵）。
name: harbor

services:
  log:
    image: goharbor/harbor-log:v2.11.0
    container_name: harbor-log
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ./data/log:/var/log/docker/:z
      - type: bind
        source: ./data/config/log/logrotate.conf
        target: /etc/logrotate.d/logrotate.conf
      - type: bind
        source: ./data/config/log/rsyslog_docker.conf
        target: /etc/rsyslog.d/rsyslog_docker.conf
    ports:
      - "127.0.0.1:1514:10514"
    networks:
      - harbor

  registry:
    image: goharbor/registry-photon:v2.11.0
    container_name: registry
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./data/registry:/storage:z
      # root.crt 直接放在 registry 設定目錄內，靠此目錄掛載一併帶入
      # /etc/registry/root.crt；不另以單檔疊掛，以避開 Docker Desktop
      # （macOS virtiofs）「於目錄掛載上再疊單檔掛載」的 mountpoint 衝突。
      - ./data/config/registry/:/etc/registry/:z
      - type: bind
        source: ./data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      log:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "registry"

  registryctl:
    image: goharbor/harbor-registryctl:v2.11.0
    container_name: registryctl
    env_file:
      - ./data/config/registryctl/env
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./data/registry:/storage:z
      - ./data/config/registry/:/etc/registry/:z
      - type: bind
        source: ./data/config/registryctl/config.yml
        target: /etc/registryctl/config.yml
      - type: bind
        source: ./data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      log:
        condition: service_healthy
      registry:
        condition: service_started
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "registryctl"

  postgresql:
    image: goharbor/harbor-db:v2.11.0
    container_name: harbor-db
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ./data/database:/var/lib/postgresql/data:z
    networks:
      harbor:
    env_file:
      - ./data/config/db/env
    depends_on:
      log:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "postgresql"

  redis:
    image: goharbor/redis-photon:v2.11.0
    container_name: redis
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./data/redis:/var/lib/redis
    networks:
      harbor:
    depends_on:
      log:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "redis"

  core:
    image: goharbor/harbor-core:v2.11.0
    container_name: harbor-core
    env_file:
      - ./data/config/core/env
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    volumes:
      - ./data/ca_download/:/etc/core/ca/:z
      - ./data/:/data/:z
      - ./data/config/core/certificates/:/etc/core/certificates/:z
      - type: bind
        source: ./data/config/core/app.conf
        target: /etc/core/app.conf
      - type: bind
        source: ./data/secret/core/private_key.pem
        target: /etc/core/private_key.pem
      - type: bind
        source: ./data/secret/keys/secretkey
        target: /etc/core/key
      - type: bind
        source: ./data/psc/
        target: /etc/core/token/
      - type: bind
        source: ./data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      harbor:
    depends_on:
      log:
        condition: service_healthy
      registry:
        condition: service_started
      redis:
        condition: service_started
      postgresql:
        condition: service_started
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "core"

  portal:
    image: goharbor/harbor-portal:v2.11.0
    container_name: harbor-portal
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - type: bind
        source: ./data/config/portal/nginx.conf
        target: /etc/nginx/nginx.conf
    networks:
      - harbor
    depends_on:
      log:
        condition: service_healthy
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "portal"

  jobservice:
    image: goharbor/harbor-jobservice:v2.11.0
    container_name: harbor-jobservice
    env_file:
      - ./data/config/jobservice/env
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./data/job_logs:/var/log/jobs:z
      - type: bind
        source: ./data/config/jobservice/config.yml
        target: /etc/jobservice/config.yml
      - type: bind
        source: ./data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      log:
        condition: service_healthy
      core:
        condition: service_started
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "jobservice"

  proxy:
    image: goharbor/nginx-photon:v2.11.0
    container_name: nginx
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ./data/config/nginx:/etc/nginx:z
      - type: bind
        source: ./data/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    ports:
      - "8081:8080"
    depends_on:
      log:
        condition: service_healthy
      registry:
        condition: service_started
      core:
        condition: service_started
      portal:
        condition: service_started
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://127.0.0.1:1514"
        tag: "proxy"

networks:
  harbor:
    name: harbor
    external: false
