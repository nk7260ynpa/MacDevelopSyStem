# Harbor 設定產生 Job。
#
# 使用官方 goharbor/prepare:v2.11.0 從 harbor-yml Secret 讀取 harbor.yml，
# 產生各 service 的設定檔與加密金鑰，寫入 harbor-config PVC。
#
# 後續所有 service Deployment 會掛載相同的 harbor-config PVC（subPath 對到
# 各 service 所需資料夾）取得設定。
#
# apply.sh 會在套用此 Job 後執行 `kubectl wait --for=condition=complete`，
# 確認 Job 完成才繼續套用其他 service。
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-prepare
  namespace: harbor
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: harbor
        component: prepare
    spec:
      restartPolicy: OnFailure
      containers:
        - name: prepare
          image: goharbor/prepare:v2.11.0
          imagePullPolicy: IfNotPresent
          # goharbor/prepare 影像的 ENTRYPOINT 為 ["python3", "main.py"]，
          # prepare 是其 click 子指令（無獨立 prepare 執行檔）；故須以
          # `python3 main.py prepare` 呼叫。另 prepare 結尾會輸出 docker-compose.yml
          # 到 /compose_location（K8s 不使用，僅需該目錄存在以免寫檔失敗）。
          command:
            - /bin/sh
            - -c
            - |
              set -eux
              mkdir -p /data /secret /compose_location
              cd /usr/src/app
              python3 main.py prepare --conf /input/harbor.yml
          volumeMounts:
            - name: harbor-yml
              mountPath: /input
              readOnly: true
            - name: config
              mountPath: /config
              subPath: config
            - name: config
              mountPath: /data
              subPath: data
            - name: config
              mountPath: /secret
              subPath: secret
      volumes:
        - name: harbor-yml
          secret:
            secretName: harbor-yml
            items:
              - key: harbor.yml
                path: harbor.yml
        - name: config
          persistentVolumeClaim:
            claimName: harbor-config
