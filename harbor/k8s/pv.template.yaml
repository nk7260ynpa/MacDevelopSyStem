# Harbor hostPath 靜態 PV 範本。
#
# 此檔為「範本」，不可直接 kubectl apply：其中 __HARBOR_DATA__ 佔位符會由
# apply.sh 於套用時以本機 harbor/k8s/data 的絕對路徑取代（sed），再交由
# kubectl apply。此為 K8s 專屬資料夾，與 Docker Compose 的 docker/data 不共用。
#
# 路徑對應（每個 PV 綁獨立子目錄，互不重疊）：
#   - harbor-config   → k8s/data/config
#       prepare Job 以 subPath config/data/secret 寫入此 PVC，故產出會落在
#       k8s/data/config/{config,data,secret}（內層 config/ 為各 service 設定，
#       屬正常巢狀）。各 service 以 subPath: config/<svc>/... 讀取，語意一致。
#   - harbor-database → k8s/data/database
#   - harbor-registry → k8s/data/registry
#   - harbor-jobservice → k8s/data/job_logs
#   - harbor-redis    → k8s/data/redis
#
# 五個 PV 各綁獨立子目錄，彼此不重疊（已移除舊版 harbor-config 綁根目錄的重疊設計）。
#
# 重點設定：
#   - hostPath + type: DirectoryOrCreate：直接綁本機目錄，缺少時自動建立。
#   - storageClassName: manual：與 01-pvc.yaml 的 PVC 對應，採靜態綁定。
#   - persistentVolumeReclaimPolicy: Retain：刪除 PVC/PV 不會清除本機資料。
#   - claimRef：預先指定綁定的 PVC（namespace + name），確保 1:1 對應。
#
# 僅適用 Docker Desktop 單節點 K8s（hostPath 指向 macOS 本機路徑）。
apiVersion: v1
kind: PersistentVolume
metadata:
  name: harbor-config-pv
  labels:
    app: harbor
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: __HARBOR_DATA__/config
    type: DirectoryOrCreate
  claimRef:
    namespace: harbor
    name: harbor-config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: harbor-database-pv
  labels:
    app: harbor
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: __HARBOR_DATA__/database
    type: DirectoryOrCreate
  claimRef:
    namespace: harbor
    name: harbor-database
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: harbor-registry-pv
  labels:
    app: harbor
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: __HARBOR_DATA__/registry
    type: DirectoryOrCreate
  claimRef:
    namespace: harbor
    name: harbor-registry
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: harbor-jobservice-pv
  labels:
    app: harbor
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: __HARBOR_DATA__/job_logs
    type: DirectoryOrCreate
  claimRef:
    namespace: harbor
    name: harbor-jobservice
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: harbor-redis-pv
  labels:
    app: harbor
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: __HARBOR_DATA__/redis
    type: DirectoryOrCreate
  claimRef:
    namespace: harbor
    name: harbor-redis
