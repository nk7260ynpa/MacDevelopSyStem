# Harbor Secret：包含 harbor.yml 設定檔內容，供 prepare Job 讀取以產生
# 各 service 之設定。
#
# 與 Docker Compose 方案的差異：
#   - external_url 改為 http://localhost:30081（NodePort）
#   - 其餘欄位與 docker/harbor.yml 相同
#
# stringData 區段以原文 YAML 提供 harbor.yml，K8s 會自動編碼成 base64。
apiVersion: v1
kind: Secret
metadata:
  name: harbor-yml
  namespace: harbor
type: Opaque
stringData:
  harbor.yml: |
    hostname: localhost
    http:
      port: 8080
    external_url: http://localhost:30081
    harbor_admin_password: Harbor12345
    database:
      password: root123
      max_idle_conns: 25
      max_open_conns: 50
    data_volume: /data
    trivy:
      ignore_unfixed: false
      skip_update: false
      offline_scan: false
      security_check: vuln
      insecure: false
    jobservice:
      max_job_workers: 1
      job_loggers:
        - STD_OUTPUT
        - FILE
      logger_sweeper_duration: 1
    notification:
      webhook_job_max_retry: 3
      webhook_job_http_client_timeout: 3
    log:
      level: info
      local:
        rotate_count: 50
        rotate_size: 200M
        location: /var/log/harbor
    proxy:
      http_proxy:
      https_proxy:
      no_proxy:
      components:
        - core
        - jobservice
        - trivy
    _version: 2.11.0
