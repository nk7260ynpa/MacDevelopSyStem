# Harbor 持久化儲存：
#   - harbor-config   ：prepare Job 寫入後、各 service Deployment 唯讀掛載
#   - harbor-database ：PostgreSQL 資料
#   - harbor-registry ：實際 image blob 儲存
#   - harbor-jobservice：背景任務 log
#   - harbor-redis    ：Redis 持久化資料
#
# storageClassName: manual —— 停用動態 provisioner，改綁 pv.template.yaml 定義的
# hostPath 靜態 PV（指向本機 harbor/k8s/data，K8s 專屬，與 Docker Compose 不共用）。
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-config
  namespace: harbor
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-database
  namespace: harbor
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-registry
  namespace: harbor
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-jobservice
  namespace: harbor
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-redis
  namespace: harbor
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
