# GitLab Omnibus 單體 Deployment。
#
# 注意事項：
#   - GitLab Omnibus 並非無狀態服務，replicas 固定為 1。
#   - 採用 Recreate 策略避免新舊 pod 同時掛載 ReadWriteOnce PVC。
#   - 首次啟動需 3-5 分鐘完成自我初始化，因此 readiness/liveness 的
#     initialDelaySeconds 設較長。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
  labels:
    app: gitlab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
            - name: ssh
              containerPort: 22
          env:
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
                external_url 'http://localhost:30080'
                gitlab_rails['gitlab_shell_ssh_port'] = 30022
                letsencrypt['enable'] = false
                prometheus_monitoring['enable'] = false
                # --- 極限壓縮：關閉非必要元件、縮減 worker（開發取向，非生產規格）---
                puma['worker_processes'] = 0          # 單進程模式，記憶體最低
                puma['min_threads'] = 1
                puma['max_threads'] = 4
                sidekiq['max_concurrency'] = 5        # 降低背景任務並發
                postgresql['shared_buffers'] = "128MB"
                postgresql['max_connections'] = 100
                registry['enable'] = false            # 已有獨立 Harbor，關閉內建 registry
                gitlab_kas['enable'] = false          # 關閉 K8s Agent Server
          volumeMounts:
            - name: config
              mountPath: /etc/gitlab
            - name: logs
              mountPath: /var/log/gitlab
            - name: data
              mountPath: /var/opt/gitlab
          resources:
            requests:
              cpu: "250m"
              memory: "1536Mi"   # 1.5Gi
            limits:
              cpu: "2"           # CPU 為可壓縮資源，limit 維持 2 以加速首次初始化
              memory: "3Gi"      # 極限可運作下限；若反覆 OOMKilled 先調回 4Gi
          readinessProbe:
            httpGet:
              path: /-/readiness
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /-/health
              port: http
            initialDelaySeconds: 600
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: gitlab-config
        - name: logs
          persistentVolumeClaim:
            claimName: gitlab-logs
        - name: data
          persistentVolumeClaim:
            claimName: gitlab-data
