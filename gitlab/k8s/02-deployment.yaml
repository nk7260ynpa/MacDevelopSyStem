# GitLab Omnibus 單體 Deployment。
#
# 注意事項：
#   - GitLab Omnibus 並非無狀態服務，replicas 固定為 1。
#   - 採用 Recreate 策略避免新舊 pod 同時掛載 ReadWriteOnce PVC。
#   - 首次啟動需 3-5 分鐘完成自我初始化，因此 readiness/liveness 的
#     initialDelaySeconds 設較長。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
  labels:
    app: gitlab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
            - name: ssh
              containerPort: 22
          env:
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
                external_url 'http://localhost:30080'
                # 容器內 nginx 監聽 80（對應 containerPort http=80 與 Service targetPort）；
                # external_url 的 :30080 僅供 GitLab 產生對外連結，對外存取由 NodePort 30080→80 轉送。
                # 未設此項時 nginx 會直接聽 external_url 的 30080，導致探針/Service 打 80 連不上而永不就緒。
                nginx['listen_port'] = 80
                # /-/health|readiness|liveness 預設僅允許 127.0.0.0/8；K8s kubelet 探針來源為
                # 節點 / Pod 網段（非 loopback），未放行會回 404 而永不就緒。開發叢集放行全部。
                gitlab_rails['monitoring_whitelist'] = ['0.0.0.0/0']
                gitlab_rails['gitlab_shell_ssh_port'] = 30022
                letsencrypt['enable'] = false
                prometheus_monitoring['enable'] = false
                # --- 極限壓縮：關閉非必要元件、縮減 worker（開發取向，非生產規格）---
                puma['worker_processes'] = 0          # 單進程模式，記憶體最低
                puma['min_threads'] = 1
                puma['max_threads'] = 4
                sidekiq['max_concurrency'] = 5        # 降低背景任務並發
                postgresql['shared_buffers'] = "128MB"
                postgresql['max_connections'] = 100
                registry['enable'] = false            # 已有獨立 Harbor，關閉內建 registry
                gitlab_kas['enable'] = false          # 關閉 K8s Agent Server
          volumeMounts:
            - name: config
              mountPath: /etc/gitlab
            - name: logs
              mountPath: /var/log/gitlab
            - name: data
              mountPath: /var/opt/gitlab
          resources:
            requests:
              cpu: "250m"
              memory: "1536Mi"   # 1.5Gi
            limits:
              cpu: "2"           # CPU 為可壓縮資源，limit 維持 2 以加速首次初始化
              memory: "4Gi"      # 常駐上限：在最小化基礎上保留維運餘裕，避免 gitlab-rails runner/console/rake 等臨時行程觸發 OOM
          readinessProbe:
            httpGet:
              path: /-/readiness
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /-/health
              port: http
            initialDelaySeconds: 600
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: gitlab-config
        - name: logs
          persistentVolumeClaim:
            claimName: gitlab-logs
        - name: data
          persistentVolumeClaim:
            claimName: gitlab-data
