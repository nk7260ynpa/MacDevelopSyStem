# GitLab hostPath 靜態 PV 範本。
#
# 此檔為「範本」，不可直接 kubectl apply：其中 __GITLAB_DATA__ 佔位符會由
# apply.sh 於套用時以本機 gitlab/k8s/data 的絕對路徑取代（sed），再交由
# kubectl apply。此為 K8s 專屬資料夾，與 Docker Compose 的 docker/data 不共用。
#
# 重點設定：
#   - hostPath + type: DirectoryOrCreate：直接綁本機目錄，缺少時自動建立。
#   - storageClassName: manual：與 01-pvc.yaml 的 PVC 對應，採靜態綁定。
#   - persistentVolumeReclaimPolicy: Retain：刪除 PVC/PV 不會清除本機資料。
#   - claimRef：預先指定綁定的 PVC（namespace + name），確保 1:1 對應。
#
# 僅適用 Docker Desktop 單節點 K8s（hostPath 指向 macOS 本機路徑）；
# kind / minikube 的節點檔案系統不同，無法直接套用。
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitlab-config-pv
  labels:
    app: gitlab
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: __GITLAB_DATA__/config
    type: DirectoryOrCreate
  claimRef:
    namespace: gitlab
    name: gitlab-config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitlab-logs-pv
  labels:
    app: gitlab
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: __GITLAB_DATA__/logs
    type: DirectoryOrCreate
  claimRef:
    namespace: gitlab
    name: gitlab-logs
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitlab-data-pv
  labels:
    app: gitlab
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: __GITLAB_DATA__/data
    type: DirectoryOrCreate
  claimRef:
    namespace: gitlab
    name: gitlab-data
