# GitLab 三組持久化儲存：
#   - gitlab-config：對應 /etc/gitlab，存放 gitlab.rb 等設定
#   - gitlab-logs  ：對應 /var/log/gitlab，存放各元件 log
#   - gitlab-data  ：對應 /var/opt/gitlab，存放 Repository、PostgreSQL、Redis 等實際資料
#
# storageClassName: manual —— 停用動態 provisioner，改綁 pv.template.yaml 定義的
# hostPath 靜態 PV（指向本機 gitlab/k8s/data，K8s 專屬，與 Docker Compose 不共用）。
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-config
  namespace: gitlab
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-logs
  namespace: gitlab
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-data
  namespace: gitlab
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
