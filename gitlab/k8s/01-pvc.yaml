# GitLab 三組持久化儲存：
#   - gitlab-config：對應 /etc/gitlab，存放 gitlab.rb 等設定
#   - gitlab-logs  ：對應 /var/log/gitlab，存放各元件 log
#   - gitlab-data  ：對應 /var/opt/gitlab，存放 Repository、PostgreSQL、Redis 等實際資料
#
# 採用叢集預設 StorageClass 動態建立 PV（未指定 storageClassName 即用 default）；
# 適用 kind / Docker Desktop kind 內建的 rancher.io/local-path provisioner。
# 資料由 provisioner 在節點本機卷管理，pod 重啟可持久；不對應 macOS 可見資料夾。
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-config
  namespace: gitlab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-logs
  namespace: gitlab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-data
  namespace: gitlab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
